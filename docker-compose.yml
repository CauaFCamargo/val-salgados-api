services:
  db:
    image: postgres:16
    container_name: val-salgados-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: val
      POSTGRES_PASSWORD: valsecret
      POSTGRES_DB: valsalgados
    ports:
      - "5432:5432"
    volumes:
      - val_pgdata:/var/lib/postgresql/data

volumes:
  val_pgdata: