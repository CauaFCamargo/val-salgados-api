name: CI

# Roda a cada push e a cada Pull Request.
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      # O Prisma Client é gerado (fica fora do Git). generate não conecta no
      # banco, mas lê a variável — por isso passamos uma DATABASE_URL de mentira.
      - name: Gerar Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: Checar tipos
        run: npm run typecheck

      - name: Rodar testes
        run: npm test
